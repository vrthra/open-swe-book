      radial-gradient(ellipse 1200px 800px at 82% 24%, {{ACCENT}}1f, transparent 70%),
      radial-gradient(ellipse 1000px 900px at 10% 60%, rgba(97,84,190,0.14), transparent 72%);

    position: relative;
    overflow: hidden;

    padding:18px 52px; border-radius:46px; }

  /* ---- Horizontal icon timeline with years ---- */
  .tl { position:absolute; left:90px; right:90px; top:1560px; height:560px; }
  .tl .line { position:absolute; left:0; right:0; top:279px; height:6px; border-radius:3px;

    box-shadow: 0 0 24px {{ACCENT}}66; }
  .node { position:absolute; top:0; width:0; }
  .node .dot { position:absolute; left:-11px; top:271px; width:22px; height:22px;
    border-radius:50%; background:#fff; box-shadow: 0 0 16px {{ACCENT}}; }
  .node .stem { position:absolute; left:-2px; width:4px; background:{{ACCENT}}66; }
  .node.up .stem { top:168px; height:103px; }
  .node.dn .stem { top:293px; height:103px; }
  .node .ic { position:absolute; left:-52px; width:104px; height:104px; border-radius:50%;
    background: rgba(13,16,30,0.92); border: 3px solid {{ACCENT}};
    box-shadow: 0 0 22px {{ACCENT}}44;
    display:flex; align-items:center; justify-content:center; }
  .node.up .ic { top:60px; }
  .node.dn .ic { top:400px; }
  .node .yr { position:absolute; left:-70px; width:140px; text-align:center;
    font-family:"DejaVu Sans Mono",monospace; font-size:34px; font-weight:bold;
    color:{{ACCENT}}; letter-spacing:2px; }
  .node.up .yr { top:8px; }
  .node.dn .yr { top:516px; }
  .node svg { width:58px; height:58px; }
  .node svg * { stroke:#eef1f8; stroke-width:2.6; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .node svg .f { fill:#eef1f8; stroke:none; }

  .meta { position:absolute; left:120px; right:120px; bottom:120px;
    border-top: 2px solid rgba(174,184,221,0.35); padding-top:52px; }
  .author { font-size:60px; color:#f0f3ff; }
  .edition { margin-top:20px; font-size:38px; color:#8f99c0; }
</style>
