name: build-and-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook + mdbook-mermaid
        run: |
          MDBOOK_VERSION="0.4.40"
          MERMAID_VERSION="0.14.0"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz --directory=/usr/local/bin
          curl -sSL "https://github.com/badboy/mdbook-mermaid/releases/download/v${MERMAID_VERSION}/mdbook-mermaid-v${MERMAID_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz --directory=/usr/local/bin

      - name: Build the book
        run: mdbook build

      - name: Check internal Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --verbose --no-progress './**/*.md'
          fail: false

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook + mdbook-mermaid
        run: |
          MDBOOK_VERSION="0.4.40"
          MERMAID_VERSION="0.14.0"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz --directory=/usr/local/bin
          curl -sSL "https://github.com/badboy/mdbook-mermaid/releases/download/v${MERMAID_VERSION}/mdbook-mermaid-v${MERMAID_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz --directory=/usr/local/bin
      - name: Build
        run: mdbook build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book-output
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
