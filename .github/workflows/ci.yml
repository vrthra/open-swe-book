name: build-and-deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages build/deploy at a time. Cancelling in-progress runs avoids
# leaving two "github-pages" artifacts behind (the cause of the
# "Multiple artifacts named github-pages" deploy error).
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build once, upload exactly one Pages artifact.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git describe sees version tags

      - name: Stamp build version into the sidebar
        run: |
          V="$(git describe --tags --always)"
          echo "build version: $V"
          sed -i "s/const VERSION = \"dev\"/const VERSION = \"${V}\"/" version.js

      - name: Install mdBook + mdbook-mermaid
        run: |
          MDBOOK_VERSION="0.4.40"
          MERMAID_VERSION="0.14.0"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz --directory=/usr/local/bin
          curl -sSL "https://github.com/badboy/mdbook-mermaid/releases/download/v${MERMAID_VERSION}/mdbook-mermaid-v${MERMAID_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz --directory=/usr/local/bin

      - name: Build the book
        run: mdbook build

      - name: Check internal Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress './**/*.md'
          fail: false

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book-output

  # Deploy the single artifact (only from main).
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
